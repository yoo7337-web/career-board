name: 기록 → Notion 동기화

on:
  schedule:
    - cron: '0 */2 * * *'   # 2시간마다 (UTC)
  workflow_dispatch:         # Actions 탭에서 수동 실행

concurrency:
  group: notion-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: notion-sync/requirements.txt
      - run: pip install -r notion-sync/requirements.txt
      - run: python notion-sync/sync.py
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SA }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          BOARD_EMAIL: ${{ secrets.BOARD_EMAIL }}
